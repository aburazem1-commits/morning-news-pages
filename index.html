
    <!DOCTYPE html>
    <html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Morning AI Portal</title>
        <meta name="description" content="AIが厳選・解説する最新ビジネスニュース">
        <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
        
        <style>
            :root {
                --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
                --card-bg: rgba(255, 255, 255, 0.03);
                --card-border: rgba(255, 255, 255, 0.08);
                --text-main: #f8fafc;
                --text-muted: #94a3b8;
                --accent-color: #38bdf8;
                --accent-gradient: linear-gradient(90deg, #38bdf8, #818cf8);
            }
            body { margin: 0; padding: 0; background: var(--bg-gradient); color: var(--text-main); font-family: 'Outfit', 'Noto Sans JP', sans-serif; min-height: 100vh; }
            .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
            header { text-align: center; margin-bottom: 60px; animation: fadeInDown 0.8s ease-out; }
            h1 { font-size: 3rem; font-weight: 800; margin: 0; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1px; }
            .subtitle { color: var(--text-muted); font-size: 1.1rem; margin-top: 10px; }
            .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 24px; }
            .card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; padding: 24px; backdrop-filter: blur(10px); transition: transform 0.3s ease, box-shadow 0.3s ease; display: flex; flex-direction: column; text-decoration: none; color: var(--text-main); }
            .card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5); border-color: rgba(56, 189, 248, 0.3); }
            .portal-card-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 10px; color: var(--accent-color); }
            .portal-card-count { font-size: 1rem; color: var(--text-muted); }
            .article-title { font-size: 1.2rem; font-weight: 600; margin: 0 0 15px 0; line-height: 1.5; }
            .article-title a { color: var(--text-main); text-decoration: none; transition: color 0.2s; }
            .article-title a:hover { color: var(--accent-color); }
            .ai-section { background: rgba(0, 0, 0, 0.2); border-radius: 12px; padding: 16px; margin-top: auto; border-left: 4px solid var(--accent-color); }
            .ai-label { font-size: 0.8rem; text-transform: uppercase; color: var(--accent-color); margin-bottom: 8px; font-weight: 800; display: flex; align-items: center; gap: 6px; }
            .ai-content { font-size: 0.95rem; color: #cbd5e1; line-height: 1.6; margin-bottom: 12px; }
            .ai-content:last-child { margin-bottom: 0; }
            .meta { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 15px; }
            .back-btn { display: inline-block; padding: 12px 24px; background: rgba(255,255,255,0.05); border: 1px solid var(--card-border); border-radius: 8px; color: var(--text-main); text-decoration: none; margin-bottom: 30px; transition: all 0.3s; font-weight: 600; }
            .back-btn:hover { background: rgba(255,255,255,0.1); transform: translateX(-5px); border-color: var(--accent-color); }
            
            /* ✨ Newバッジのスタイル */
            .badge-new {
                display: inline-block;
                background: linear-gradient(135deg, #f43f5e, #fb923c);
                color: white;
                font-size: 0.75rem;
                font-weight: 800;
                padding: 3px 8px;
                border-radius: 12px;
                margin-left: 10px;
                vertical-align: middle;
                text-transform: uppercase;
                letter-spacing: 1px;
                box-shadow: 0 0 10px rgba(244, 63, 94, 0.5);
                animation: pulseBadge 2s infinite;
            }
            
            /* ✨ 新着カード専用の光る演出（2.5秒でスッと消える！） */
            .card-new-highlight {
                animation: newCardFlash 2.5s ease-out forwards;
            }

            @keyframes pulseBadge {
                0% { transform: scale(1); box-shadow: 0 0 5px rgba(244,63,94,0.4); }
                50% { transform: scale(1.05); box-shadow: 0 0 15px rgba(244,63,94,0.8); }
                100% { transform: scale(1); box-shadow: 0 0 5px rgba(244,63,94,0.4); }
            }

            @keyframes newCardFlash {
                0% { box-shadow: 0 0 0px rgba(56, 189, 248, 0); border-color: var(--card-border); }
                15% { box-shadow: 0 0 30px rgba(56, 189, 248, 0.6); border-color: rgba(56, 189, 248, 1); transform: translateY(-3px); }
                80% { box-shadow: 0 0 15px rgba(56, 189, 248, 0.3); border-color: rgba(56, 189, 248, 0.5); transform: translateY(-1px); }
                100% { box-shadow: 0 0 0px rgba(56, 189, 248, 0); border-color: var(--card-border); transform: translateY(0); }
            }

            @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
            @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        </style>
    
    </head>
    <body>

            <div class="grid" style="animation: fadeIn 1s ease-out;">

        </div>
    </body>
    </html>
